name: Daily Automated AI Blog Generator

on:
  schedule:
    # Runs at 16:05 PKT (11:05 UTC) every day
    - cron: '5 11 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  generate-ai-blogs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai requests pillow python-dotenv

      - name: Run AI Blog Generator Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python scripts/generate_blogs.py

      - name: Commit and Push Generated AI Blogs
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: publish daily AI generated blog post" && git push)
